<!DOCTYPE html>
<html>
<head>
  <title>Transaction History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="card">
  <h2>Transactions</h2>
  <table>
    {% for r in data %}

  <a href="/services" class="btn back-btn">Back</a>
</div>

<script src="{{ url_for('static', filename='ripple.js') }}"></script>

</body>
</html>
